services:
  postgres:
    image: postgres:16-alpine
    container_name: collabcode_db
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-collabcode}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-collabcode_dev_pass}
      POSTGRES_DB:       ${POSTGRES_DB:-collabcode}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-collabcode}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: collabcode_redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-dev_redis_pass}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-dev_redis_pass}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: collabcode_backend
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-collabcode}:${POSTGRES_PASSWORD:-collabcode_dev_pass}@postgres:5432/${POSTGRES_DB:-collabcode}"
      REDIS_URL:    "redis://:${REDIS_PASSWORD:-redis_dev_pass}@redis:6379/0"
      SECRET_KEY:   ${SECRET_KEY:-383e4115d1ce2d99a527be50dfc72d959cd18ba6d942631fc3e64f3f66ce2fff}
      ALGORITHM:    "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: ${TOKEN_EXPIRE_MINUTES:-60}
      CORS_ORIGINS: '["http://localhost:5173"]'
      # Google OAuth
      GOOGLE_CLIENT_ID:     "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      GOOGLE_REDIRECT_URI:  "http://localhost:5173/api/v1/auth/oauth/google/callback"
      # GitHub OAuth
      GITHUB_CLIENT_ID:     "${GITHUB_CLIENT_ID:-}"
      GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET:-}"
      GITHUB_REDIRECT_URI:  "http://localhost:5173/api/v1/auth/oauth/github/callback"
      FRONTEND_URL:         "${FRONTEND_URL:-http://localhost:5173}"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: collabcode_frontend
    environment:
      # These are used by the BROWSER — must be localhost (user's machine)
      VITE_API_URL: "http://localhost:8000"
      VITE_WS_URL:  "ws://localhost:8000"
      # This is used by Vite's DEV SERVER proxy — must be Docker service name
      VITE_BACKEND_INTERNAL: "http://backend:8000"
      VITE_GOOGLE_CLIENT_ID: "${VITE_GOOGLE_CLIENT_ID:-}"
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
